
<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>結果 - XPS Si2p Peak Fitting (Flask v3.2)</title>
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; margin: 40px; }
    .card { max-width: 1100px; margin: auto; padding: 24px; border: 1px solid #e5e7eb; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.04); }
    table { border-collapse: collapse; width: 100%; margin-top: 10px; }
    th, td { border: 1px solid #e5e7eb; padding: 8px 10px; text-align: center; }
    th { background: #f9fafb; }
    .btn { display: inline-block; padding: 8px 12px; border-radius: 8px; border: 1px solid #d1d5db; background: #f9fafb; cursor: pointer; text-decoration: none; color: inherit; }
    .btn:hover { background: #f3f4f6; }
    img { max-width: 100%; height: auto; border-radius: 8px; border: 1px solid #e5e7eb; margin-top: 10px; }
    .row { margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>解析結果</h1>

    <div class="row">
      <h3>結果テーブル</h3>
      <table>
        <thead>
          <tr>
            <th>Peak</th><th>Center_eV</th><th>FWHM_eV</th><th>Height</th><th>Area</th>
          </tr>
        </thead>
        <tbody>
        {% for r in table %}
          <tr>
            <td>{{ r.Peak }}</td>
            <td>{{ "%.3f"|format(r.Center_eV) }}</td>
            <td>{{ "%.3f"|format(r.FWHM_eV) }}</td>
            <td>{{ "%.1f"|format(r.Height) }}</td>
            <td>{{ "%.1f"|format(r.Area) }}</td>
          </tr>
        {% endfor %}
        </tbody>
      </table>
    </div>

    <div class="row">
      <a class="btn" href="{{ url_for('download', fname=csv_name) }}">結果CSVをダウンロード</a>
    </div>

    <div class="row">
      <h3>Raw / Smoothed / Background</h3>
      <img src="{{ img_rawbg }}" alt="raw-bg plot">
    </div>

    <div class="row">
      <h3>Corrected / Fit / Components</h3>
      <img src="{{ img_fit }}" alt="fit plot">
    </div>

    <div class="row">
      <a class="btn" href="{{ url_for('index') }}">別のファイルを解析</a>
    </div>
  </div>
</body>
</html>
