
<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>XPS Si2p Peak Fitting (Flask v3.6)</title>
  <style>
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; margin: 40px; }
    .card { max-width: 1000px; margin: auto; padding: 24px; border: 1px solid #e5e7eb; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.04); }
    .btn { display: inline-block; padding: 10px 16px; border-radius: 8px; border: 1px solid #d1d5db; background: #f9fafb; cursor: pointer; }
    .btn:hover { background: #f3f4f6; }
    .row { margin-top: 12px; }
    fieldset { border: 1px solid #e5e7eb; border-radius: 8px; padding: 12px; }
    legend { font-weight: 600; }
    label { display: inline-block; min-width: 120px; }
    input[type="number"] { width: 120px; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px 16px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>XPS Si2p Peak Fitting（Flask v3.6 / Configurable）</h1>
    {% with messages = get_flashed_messages() %}
      {% if messages %}<div style="color:#b91c1c">{{ messages[0] }}</div>{% endif %}
    {% endwith %}

    <form action="/fit" method="post" enctype="multipart/form-data">
      <div class="row"><input class="btn" type="file" name="file" accept=".csv" required></div>

      <div class="row">
        <fieldset>
          <legend>範囲・前処理</legend>
          <div class="grid">
            <div><label>Energy min (eV)</label><input type="number" step="0.1" name="energy_min" value="{{ defaults.energy_min }}"></div>
            <div><label>Energy max (eV)</label><input type="number" step="0.1" name="energy_max" value="{{ defaults.energy_max }}"></div>
            <div><label>S-G max window</label><input type="number" step="1" name="smooth_maxwin" value="{{ defaults.smooth_maxwin }}"></div>
            <div><label>S-G poly</label><input type="number" step="1" name="poly" value="{{ defaults.poly }}"></div>
            <div><label>Fit ε (% of max)</label><input type="number" step="0.1" name="eps_pct" value="{{ defaults.eps_pct }}"></div>
          </div>
        </fieldset>
      </div>

      <div class="row">
        <fieldset>
          <legend>ピーク中心（初期値と拘束）</legend>
          <div class="grid">
            <div><label>Au ghost c1</label><input type="number" step="0.1" name="c1" value="{{ defaults.c1 }}"></div>
            <div><label>min</label><input type="number" step="0.1" name="c1_min" value="{{ defaults.c1_min }}"></div>
            <div><label>max</label><input type="number" step="0.1" name="c1_max" value="{{ defaults.c1_max }}"></div>

            <div><label>SiO (siloxane) c2</label><input type="number" step="0.1" name="c2" value="{{ defaults.c2 }}"></div>
            <div><label>min</label><input type="number" step="0.1" name="c2_min" value="{{ defaults.c2_min }}"></div>
            <div><label>max</label><input type="number" step="0.1" name="c2_max" value="{{ defaults.c2_max }}"></div>

            <div><label>SiO2 c3</label><input type="number" step="0.1" name="c3" value="{{ defaults.c3 }}"></div>
            <div><label>min</label><input type="number" step="0.1" name="c3_min" value="{{ defaults.c3_min }}"></div>
            <div><label>max</label><input type="number" step="0.1" name="c3_max" value="{{ defaults.c3_max }}"></div>
          </div>
        </fieldset>
      </div>

      <div class="row">
        <fieldset>
          <legend>FWHM 拘束 (eV)</legend>
          <div class="grid">
            <div><label>FWHM min</label><input type="number" step="0.1" name="fwhm_min" value="{{ defaults.fwhm_min }}"></div>
            <div><label>FWHM max</label><input type="number" step="0.1" name="fwhm_max" value="{{ defaults.fwhm_max }}"></div>
          </div>
        </fieldset>
      </div>

      <div class="row"><button class="btn" type="submit">解析する</button></div>
    </form>
  </div>
</body>
</html>
